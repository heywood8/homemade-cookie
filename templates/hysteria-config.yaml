# Hysteria2 server - QUIC/UDP 443, Salamander obfuscation, self-signed TLS.
# Users (auth.userpass) are managed by `vpn-user`; it starts empty.
listen: :443

tls:
  cert: /etc/hysteria/server.crt
  key: /etc/hysteria/server.key

# Salamander obfuscation: wraps QUIC so DPI can't fingerprint it as Hysteria/QUIC.
obfs:
  type: salamander
  salamander:
    password: __OBFS_PASSWORD__

auth:
  type: userpass
  userpass: {}

# If probed with a real browser (HTTP/3), serve the cover site instead.
masquerade:
  type: proxy
  proxy:
    url: __MASQUERADE_URL__
    rewriteHost: true
  listenHTTPS: ""

quic:
  initStreamReceiveWindow: 8388608
  maxStreamReceiveWindow: 8388608
  initConnReceiveWindow: 20971520
  maxConnReceiveWindow: 20971520
  maxIdleTimeout: 30s
  keepAliveInterval: 10s

bandwidth:
  up: 200 mbps
  down: 200 mbps

ignoreClientBandwidth: false

# Force IPv4 egress. Most VPS get IPv4 + link-local only, with no global IPv6 route; without
# this, Hysteria tries IPv6 for dual-stack destinations and those connections hang until they
# time out client-side (see the same fix on the Xray side: routing.rules ip=["::/0"]).
outbounds:
  - name: v4only
    type: direct
    direct:
      mode: 4

# Per-user traffic stats (read by the portal monitor). Localhost only.
trafficStats:
  listen: 127.0.0.1:9999
  secret: __HY_STATS_SECRET__
