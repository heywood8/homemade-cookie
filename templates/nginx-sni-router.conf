# SNI-based router on TCP :443 (nginx stream module).
# Reads the TLS SNI without decrypting and forwards the raw stream:
#   __DOMAIN__  -> local portal (127.0.0.1:8443, nginx TLS)
#   everything else (VPN clients send the cover SNI) -> Xray REALITY (127.0.0.1:8001)
# This lets the website and the VPN share port 443. REALITY sees an untouched handshake.

map $ssl_preread_server_name $vpn_backend {
    __DOMAIN__   127.0.0.1:8443;
    default      127.0.0.1:8001;
}

server {
    listen 443 reuseport;
    listen [::]:443 reuseport;
    ssl_preread on;
    proxy_pass $vpn_backend;
    proxy_timeout 300s;
    proxy_connect_timeout 5s;
    proxy_socket_keepalive on;
}
