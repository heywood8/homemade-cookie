# Portal site, served behind the SNI router. TLS terminates here on 127.0.0.1:8443
# (self-signed origin cert; Cloudflare "Full" mode accepts it). Requests are proxied to the
# form-login portal (vpn-portal.service on 127.0.0.1:8081). Port 80 stays public for plain HTTP.

# Drop anything not addressed to our hostname (raw-IP scans, wrong SNI, etc.)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 127.0.0.1:8443 ssl default_server;
    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    listen 127.0.0.1:8443 ssl;
    server_name __DOMAIN__;

    ssl_certificate     /etc/nginx/ssl/origin.crt;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    server_tokens off;

    # VLESS + WebSocket (no REALITY) — CDN-frontable fallback. When a client's ISP blocks
    # direct TCP/443 to this server's IP or fingerprints REALITY/QUIC, put this domain behind
    # Cloudflare (or any CDN); this path rides ordinary HTTPS to the CDN's own IPs instead.
    # Secret path -> xray ws inbound on 127.0.0.1:8002. Everything else -> portal.
    location __WS_CDN_PATH__ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 315s;
        proxy_send_timeout 315s;
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    access_log /var/log/nginx/portal.access.log;
    error_log  /var/log/nginx/portal.error.log;
}
